services:
  traefik:
    image: traefik:v3.6
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=preview-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.le.acme.dnschallenge=true"
      - "--certificatesresolvers.le.acme.dnschallenge.provider=route53"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--api.dashboard=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - preview-net
    environment:
      - AWS_REGION=${AWS_REGION:-eu-central-1}
      - AWS_HOSTED_ZONE_ID=${AWS_HOSTED_ZONE_ID}
    labels:
      - "traefik.enable=true"
      # Traefik dashboard at api.<PREVIEW_DOMAIN>/dashboard/
      - "traefik.http.routers.traefik-dashboard.rule=Host(`api.${PREVIEW_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=le"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
    restart: unless-stopped

  orchestrator:
    build:
      context: ./orchestrator-app
      dockerfile: docker/prod/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - orchestrator-data:/data
      - /opt/orchestrator/workspaces:/opt/orchestrator/workspaces
      - /opt/orchestrator/targets.json:/opt/orchestrator/targets.json:ro
    networks:
      - preview-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=Host(`api.${PREVIEW_DOMAIN}`) && !PathPrefix(`/api`) && !PathPrefix(`/dashboard`)"
      - "traefik.http.routers.orchestrator.entrypoints=websecure"
      - "traefik.http.routers.orchestrator.tls.certresolver=le"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8080"
    environment:
      - APP_ENV=production
      - PORT=8080
      - DATABASE_PATH=/data/orchestrator.db
      - PREVIEW_DOMAIN=${PREVIEW_DOMAIN}
      - WORKSPACE_DIR=/opt/orchestrator/workspaces
      - TARGETS_CONFIG_PATH=/opt/orchestrator/targets.json
      - AWS_REGION=${AWS_REGION:-eu-central-1}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - SLACK_WORKSPACE=${SLACK_WORKSPACE:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

networks:
  preview-net:
    external: true

volumes:
  letsencrypt:
  orchestrator-data:
