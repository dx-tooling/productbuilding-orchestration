aws:
  access_key_id: FOO...
  secret_access_key: BAR...

# GitHub PAT for infrastructure management (creating webhooks, repo secrets via OpenTofu)
github_pat_mgmt: github_pat_...

# Per-target-repo credentials are managed via OpenTofu (targets.auto.tfvars)
# and stored in AWS Secrets Manager at: productbuilder/targets/{repo_name}
# They are NOT stored in this file.
#
# Each target repo has:
#   github_pat:        fine-grained PAT scoped to that repo (for orchestrator)
#   webhook_secret:    HMAC secret for webhook signature validation
#   anthropic_api_key: for Claude Code GitHub Actions
