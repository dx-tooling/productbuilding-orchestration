#cloud-config

package_update: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - jq
  - unzip
  - git

write_files:
  - path: /opt/orchestrator/install-docker.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      # Install Docker using official convenience script
      curl -fsSL https://get.docker.com | sh

      # Enable and start Docker
      systemctl enable docker
      systemctl start docker

      # Add ubuntu user to docker group
      usermod -aG docker ubuntu

      # Verify
      docker compose version

  - path: /opt/orchestrator/setup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      AWS_REGION="${aws_region}"
      PROJECT_PREFIX="${project_prefix}"
      PREVIEW_DOMAIN="${preview_domain}"
      HOSTED_ZONE_ID="${hosted_zone_id}"
      REPO_CLONE_URL="${repo_clone_url}"
      SLACK_WORKSPACE="${slack_workspace}"

      echo "=== Provisioning persistent state volume ==="
      STATE_MOUNT=/var/lib/orchestrator-state
      STATE_LABEL=orchestrator-state

      # Wait for the secondary EBS to attach (up to ~60s). lsblk lists block
      # devices; we want the only "disk" with no MOUNTPOINT and no children
      # (the root disk has children for the mounted partitions).
      DEVICE=""
      for i in $(seq 1 30); do
        DEVICE=$(lsblk -ndo NAME,TYPE,MOUNTPOINT | awk '$2=="disk" && $3=="" {print "/dev/"$1}' | while read -r dev; do
          # Skip if the device has any partitions/children
          [ "$(lsblk -no NAME "$dev" | wc -l)" -eq 1 ] && echo "$dev"
        done | head -1)
        [ -n "$DEVICE" ] && break
        sleep 2
      done
      if [ -z "$DEVICE" ]; then
        echo "ERROR: persistent state volume not found after 60s" >&2
        lsblk >&2
        exit 1
      fi
      echo "Persistent state volume detected at $DEVICE"

      # Format only if there is no filesystem yet (idempotent across boots).
      if ! blkid "$DEVICE" >/dev/null 2>&1; then
        echo "First boot: formatting $DEVICE as ext4 with label $STATE_LABEL"
        mkfs.ext4 -L "$STATE_LABEL" "$DEVICE"
      else
        echo "Existing filesystem detected on $DEVICE, skipping mkfs"
      fi

      mkdir -p "$STATE_MOUNT"

      # Persist mount via fstab (label-based so it survives device renames).
      if ! grep -q "LABEL=$STATE_LABEL" /etc/fstab; then
        echo "LABEL=$STATE_LABEL $STATE_MOUNT ext4 defaults,nofail,x-systemd.device-timeout=30 0 2" >> /etc/fstab
      fi
      mount -a

      mkdir -p "$STATE_MOUNT/db" "$STATE_MOUNT/letsencrypt"
      chown -R ubuntu:ubuntu "$STATE_MOUNT"

      echo "=== Creating shared Docker network ==="
      docker network create preview-net 2>/dev/null || true

      echo "=== Cloning orchestration repo ==="
      if [[ -d /opt/orchestrator/repo ]]; then
        cd /opt/orchestrator/repo && git pull
      else
        git clone "$REPO_CLONE_URL" /opt/orchestrator/repo
      fi
      mkdir -p /opt/orchestrator/workspaces
      chown -R ubuntu:ubuntu /opt/orchestrator
      # Set safe.directory for both root (cloud-init/docker) and ubuntu (SSH deploys)
      HOME=/root git config --global --add safe.directory /opt/orchestrator/repo
      su - ubuntu -c "git config --global --add safe.directory /opt/orchestrator/repo"

      echo "=== Writing .env for Compose stack ==="
      {
        echo "AWS_REGION=$AWS_REGION"
        echo "AWS_HOSTED_ZONE_ID=$HOSTED_ZONE_ID"
        echo "PREVIEW_DOMAIN=$PREVIEW_DOMAIN"
        echo "PROJECT_PREFIX=$PROJECT_PREFIX"
        echo "SLACK_WORKSPACE=$SLACK_WORKSPACE"
        echo "ACME_EMAIL=${acme_email}"
      } > /opt/orchestrator/repo/.env

      echo "=== Fetching Slack signing secret (if configured) ==="
      SLACK_SIGNING_SECRET=$(aws secretsmanager get-secret-value \
        --region "$AWS_REGION" \
        --secret-id "$PROJECT_PREFIX/slack-signing-secret" \
        --query "SecretString" \
        --output text 2>/dev/null || echo "")
      if [[ -n "$SLACK_SIGNING_SECRET" ]]; then
        echo "SLACK_SIGNING_SECRET=$SLACK_SIGNING_SECRET" >> /opt/orchestrator/repo/.env
        echo "=== Slack signing secret loaded ==="
      fi

      echo "=== Fetching LLM API key (if configured) ==="
      LLM_API_KEY=$(aws secretsmanager get-secret-value \
        --region "$AWS_REGION" \
        --secret-id "$PROJECT_PREFIX/llm-api-key" \
        --query "SecretString" \
        --output text 2>/dev/null || echo "")
      if [[ -n "$LLM_API_KEY" ]]; then
        echo "LLM_API_KEY=$LLM_API_KEY" >> /opt/orchestrator/repo/.env
        echo "LLM_PROVIDER=anthropic" >> /opt/orchestrator/repo/.env
        echo "LLM_MODEL=claude-opus-4-6" >> /opt/orchestrator/repo/.env
        echo "=== LLM API key loaded ==="
      fi

      echo "=== Fetching target secrets from Secrets Manager ==="
      TARGETS="[]"
      for secret_name in $(aws secretsmanager list-secrets \
        --region "$AWS_REGION" \
        --filters "Key=name,Values=$PROJECT_PREFIX/targets/" \
        --query "SecretList[].Name" \
        --output text); do

        SECRET_VALUE=$(aws secretsmanager get-secret-value \
          --region "$AWS_REGION" \
          --secret-id "$secret_name" \
          --query "SecretString" \
          --output text)

        TARGETS=$(echo "$TARGETS" | jq --argjson item "$SECRET_VALUE" '. + [$item]')
      done

      echo "$TARGETS" > /opt/orchestrator/targets.json
      echo "=== Loaded $(echo "$TARGETS" | jq length) target(s) ==="

      echo "=== Starting Compose stack ==="
      cd /opt/orchestrator/repo
      docker compose up -d

      echo "=== Setup complete ==="

runcmd:
  - |
    # Install AWS CLI v2
    curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscli.zip
    unzip -qo /tmp/awscli.zip -d /tmp
    /tmp/aws/install
    rm -rf /tmp/awscli.zip /tmp/aws
  - /opt/orchestrator/install-docker.sh
  - /opt/orchestrator/setup.sh
